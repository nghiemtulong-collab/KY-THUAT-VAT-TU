<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kỹ thuật vật tư — ICD Phúc Long</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --deep:#16302B; --deep-2:#1F4A40; --safety:#F28C1B; --safety-dark:#D0730A;
  --paper:#F4F6F3; --line:#D5DBD2; --ink:#1A2622; --muted:#68766F;
  --ok:#1E7F4F; --danger:#B3261E; --white:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Be Vietnam Pro',system-ui,sans-serif;background:var(--paper);color:var(--ink);font-size:16px;line-height:1.45}
.wrap{max-width:520px;margin:0 auto;padding:0 14px 120px}

header{background:var(--deep);color:var(--white);padding:14px;position:sticky;top:0;z-index:30;box-shadow:0 2px 8px rgba(22,48,43,.3)}
.hd-inner{max-width:520px;margin:0 auto}
.hd-title{font-weight:800;font-size:17px;letter-spacing:.2px}
.hd-sub{font-size:12px;color:#AFC4BC;margin-top:2px}
.hd-accent{color:var(--safety)}
.logout-btn{position:absolute;right:14px;top:12px;border:1px solid #527067;background:transparent;color:#D7E4DF;border-radius:8px;padding:5px 9px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer}.logout-btn:hover{border-color:var(--safety);color:var(--safety)}
.xe-hero{display:flex;align-items:baseline;gap:10px;margin-top:2px}
.xe-hero .code{font-size:30px;font-weight:800;letter-spacing:1px;color:var(--safety)}
.xe-hero .loai{font-size:13px;color:#AFC4BC;font-weight:600}

.tabs{display:flex;background:#0D211D;border-radius:10px;padding:3px;margin-top:12px;gap:2px}
.tabs button{flex:1;border:0;background:transparent;color:#93A8A0;font-family:inherit;font-weight:700;font-size:12.5px;padding:9px 2px;border-radius:8px;cursor:pointer;white-space:nowrap}
.tabs button.on{background:var(--safety);color:var(--deep)}

.pane{display:none;padding-top:12px}
.pane.on{display:block}
.load{text-align:center;color:var(--muted);padding:26px 0;font-size:14px}
.warn-note{background:#FFF4E4;border:1px solid var(--safety);border-radius:10px;padding:9px 12px;font-size:12.5px;color:#7A4A08;margin-bottom:10px}

/* Hồ sơ xe */
.sec-t{font-weight:800;font-size:14px;color:var(--deep-2);margin:14px 0 8px}
.bd-card{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px}
.bd-card .nm{font-size:14px;font-weight:700}
.bd-card .cyc{font-size:12px;color:var(--muted);margin-top:1px}
.bd-card .due{margin-top:6px;font-size:13px}
.bd-card .due b{font-size:15px}
.bd-card.over{border-color:var(--danger);background:#FDF3F2}
.bd-card.over .due b{color:var(--danger)}
.tag{display:inline-block;font-size:10.5px;font-weight:800;border-radius:6px;padding:1px 7px;vertical-align:middle}
.tag.over{background:#FDE8E6;color:var(--danger)}
.tag.nobase{background:#EEF1EC;color:var(--muted)}
.tag.open{background:#FDE8E6;color:var(--danger)}
.hist-row{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:6px;font-size:12.5px}
.hist-row .top{display:flex;justify-content:space-between;gap:8px;font-weight:600}
.hist-row .sub{color:var(--muted);margin-top:2px}
.hist-tag{font-size:11px;font-weight:800;border-radius:6px;padding:1px 7px;margin-right:6px}
.hist-tag.bh{background:#FDE8E6;color:var(--danger)}
.hist-tag.sc{background:#E3F2E9;color:var(--ok)}
.hist-tag.bd{background:#E7EEFB;color:#2B4C8C}
.hist-tag.n{background:#E3F2E9;color:var(--ok)}
.hist-tag.d{background:#FFF3DC;color:#8A5A00}
.hist-row.neg{border-color:var(--danger)}

/* Form chung */
.fbox{background:var(--white);border:2px solid var(--deep-2);border-radius:14px;overflow:hidden;margin-top:4px}
.fbox-head{background:var(--deep-2);color:var(--white);padding:10px 14px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center}
.fbox-head .badge{background:var(--safety);color:var(--deep);border-radius:20px;padding:2px 10px;font-size:13px}
.frow{padding:10px 12px;border-bottom:1px dashed var(--line)}
.frow:last-child{border-bottom:0}
.frow label{display:block;font-size:13px;font-weight:700;margin-bottom:5px}
.frow input[type=text],.frow input[type=number],.frow input[type=date],.frow select,.frow textarea{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:10px 11px;font-family:inherit;font-size:15px;background:var(--white)}
.frow textarea{min-height:70px;resize:vertical}
.frow input:focus,.frow select:focus,.frow textarea:focus{outline:none;border-color:var(--safety)}
.seg2{display:flex;gap:8px}
.seg2 button{flex:1;border:1.5px solid var(--line);border-radius:10px;background:var(--white);font-family:inherit;font-weight:700;font-size:13.5px;padding:11px 0;cursor:pointer;color:var(--muted)}
.seg2 button.on{background:var(--deep-2);color:var(--white);border-color:var(--deep-2)}
.seg2 button.on.bad{background:var(--danger);border-color:var(--danger)}
.radio-list label{display:flex;gap:9px;align-items:flex-start;background:var(--paper);border:1.5px solid var(--line);border-radius:10px;padding:10px 11px;margin-bottom:7px;font-weight:600;font-size:13.5px;cursor:pointer}
.radio-list label.on{border-color:var(--safety);background:#FFF7EB}
.radio-list input{width:19px;height:19px;margin-top:1px;accent-color:var(--safety)}
.radio-list .cyc{font-size:11.5px;color:var(--muted);font-weight:400}
.adjust-row{display:flex;gap:9px;align-items:flex-start}
.adjust-row input[type=checkbox]{width:20px;height:20px;margin-top:1px;accent-color:var(--safety)}
.adjust-row .lbl{font-size:13px;font-weight:700}
.adjust-row .sub{font-size:11.5px;color:var(--muted);font-weight:400;margin-top:2px}
.reset-toggle{cursor:pointer;user-select:none}
.reset-toggle.on{background:#FFF7EB}
.reset-toggle input[type=checkbox]{flex-shrink:0}

/* Tìm vật tư + slip */
.search-box input{width:100%;border:2px solid var(--line);border-radius:12px;padding:13px 14px;font-family:inherit;font-size:16px;background:var(--white)}
.search-box input:focus{outline:none;border-color:var(--safety)}
.hint{font-size:12.5px;color:var(--muted);margin:6px 0}
.item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--white);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:7px;cursor:pointer}
.item:active{background:#FFF7EB}
.item .nm{font-size:14px;font-weight:500}
.item .cd{font-size:12px;color:var(--muted);margin-top:2px}
.item .add{flex-shrink:0;width:36px;height:36px;border-radius:10px;background:var(--deep-2);color:var(--white);border:0;font-size:21px;font-weight:700;cursor:pointer;line-height:1}
.item.added{border-color:var(--safety);background:#FFF7EB}
.item.added .add{background:var(--safety);color:var(--deep)}
.item.out-of-stock{opacity:.62;background:#F1F2EF;border-style:dashed;cursor:not-allowed}
.item.out-of-stock .add{width:auto;min-width:48px;padding:0 8px;background:#8A9690;color:var(--white);font-size:11px;text-transform:uppercase}
.empty-note{color:var(--muted);font-size:14px;text-align:center;padding:14px 0}
.slip-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px dashed var(--line)}
.slip-row .info{flex:1;min-width:0}
.slip-row .nm{font-size:13.5px;font-weight:600;overflow-wrap:break-word}
.slip-row .cd{font-size:11.5px;color:var(--muted)}
.qty{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty button{width:33px;height:33px;border-radius:9px;border:1.5px solid var(--line);background:var(--white);font-size:19px;font-weight:700;cursor:pointer;color:var(--deep-2)}
.qty input{width:52px;height:33px;text-align:center;border:1.5px solid var(--line);border-radius:9px;font-family:inherit;font-size:15px;font-weight:700}
.slip-row .rm{width:30px;height:30px;border:0;background:transparent;color:var(--danger);font-size:19px;cursor:pointer;flex-shrink:0}
.slip-empty{padding:14px;text-align:center;color:var(--muted);font-size:13.5px}
body.adjusting .fbox.slipbox{border-color:var(--danger)}
body.adjusting .fbox.slipbox .fbox-head{background:var(--danger)}

/* Tồn kho */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px}
.chips button{border:1.5px solid var(--line);border-radius:20px;background:var(--white);font-family:inherit;font-weight:700;font-size:12.5px;padding:7px 13px;cursor:pointer;color:var(--muted);white-space:nowrap}
.chips button.on{background:var(--deep-2);color:var(--white);border-color:var(--deep-2)}
.stock-row{display:flex;justify-content:space-between;align-items:center;background:var(--white);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:6px}
.stock-row .nm{font-size:13.5px;font-weight:500}
.stock-row .cd{font-size:11.5px;color:var(--muted)}
.stock-row .ton{font-size:17px;font-weight:800;color:var(--deep-2);white-space:nowrap;margin-left:10px}
.stock-row .ton small{font-size:11px;color:var(--muted);font-weight:600}
.stock-row.zero .ton{color:var(--danger)}
.stock-row.low{border-color:var(--danger);background:#FDF3F2}
.stock-row.low .ton{color:var(--danger)}
.low-tag{display:inline-block;font-size:10.5px;font-weight:800;background:#FDE8E6;color:var(--danger);border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle}

/* Bottom bar */
.bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--line);padding:12px 14px calc(12px + env(safe-area-inset-bottom));z-index:40;display:none}
.bar.show{display:block}
.bar-inner{max-width:520px;margin:0 auto;display:flex;gap:10px;align-items:center}
.bar .sum{font-size:13px;color:var(--muted);flex:1}
.bar .sum b{color:var(--ink);font-size:15px}
.send{border:0;border-radius:12px;background:var(--safety);color:var(--deep);font-family:inherit;font-weight:800;font-size:16px;padding:14px 22px;cursor:pointer;box-shadow:0 2px 6px rgba(208,115,10,.4)}
.send:disabled{background:#DDE2DB;color:#9AA69E;box-shadow:none;cursor:default}

/* Overlays */
.overlay{position:fixed;inset:0;background:rgba(22,48,43,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.overlay.show{display:flex}
.card{background:var(--white);border-radius:16px;max-width:420px;width:100%;padding:24px 20px;text-align:center;max-height:88vh;overflow:auto}
.card .big{font-size:44px;line-height:1;margin-bottom:10px}
.card h2{font-size:17px;font-weight:800;margin-bottom:8px}
.card p{font-size:14px;color:var(--muted);margin-bottom:16px}
.card .summary{background:var(--paper);border-radius:10px;padding:10px 12px;font-size:13px;text-align:left;margin-bottom:16px;max-height:180px;overflow:auto}
.card button{border:0;border-radius:10px;font-family:inherit;font-weight:700;font-size:15px;padding:12px 20px;cursor:pointer}
.card .primary{background:var(--deep-2);color:var(--white);width:100%}
.spinner{width:36px;height:36px;border:4px solid var(--line);border-top-color:var(--safety);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.spinner{animation:none}}
.pin-row{margin-bottom:14px}
.pin-row label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;text-align:left}
.pin-row input{width:100%;border:2px solid var(--line);border-radius:10px;padding:12px;font-family:inherit;font-size:20px;text-align:center;letter-spacing:6px}
.pin-row input:focus{outline:none;border-color:var(--safety)}
.pin-err{color:var(--danger);font-size:12.5px;margin-top:5px;display:none;text-align:left}
.doc-link{display:block;background:var(--safety);color:var(--deep);font-weight:800;border-radius:10px;padding:12px;margin-bottom:12px;text-decoration:none;font-size:15px}
.retry{margin-top:8px}
.retry a{color:var(--muted);font-size:13.5px}

/* Dashboard tổng */
body.dash .wrap{max-width:760px}
body.dash header .hd-inner{max-width:760px}
.counts{display:flex;gap:8px;margin:12px 0 4px}
.count-card{flex:1;background:var(--white);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center}
.count-card .num{font-size:26px;font-weight:800;color:var(--deep-2);line-height:1.1}
.count-card .lb{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}
.count-card.bad{border-color:var(--danger);background:#FDF3F2}
.count-card.bad .num{color:var(--danger)}
.fleet{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:7px}
.fleet a{display:block;border-radius:10px;padding:8px 4px;text-align:center;text-decoration:none;border:1.5px solid var(--line);background:var(--white)}
.fleet .fc{font-size:15px;font-weight:800;color:var(--deep-2)}
.fleet .fs{font-size:10px;font-weight:700;color:var(--ok);margin-top:1px}
.fleet a.warn{border-color:var(--safety);background:#FFF7EB}
.fleet a.warn .fs{color:var(--safety-dark)}
.fleet a.dead{border-color:var(--danger);background:#FDECEA}
.fleet a.dead .fc,.fleet a.dead .fs{color:var(--danger)}
.gio-table{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--line);border-radius:10px;overflow:hidden;font-size:12.5px}
.gio-table th{background:var(--paper);text-align:left;padding:7px 9px;font-size:11.5px;color:var(--muted)}
.gio-table td{padding:7px 9px;border-top:1px solid var(--line)}
.gio-table td b{color:var(--deep-2)}
.dash-note{font-size:11.5px;color:var(--muted);margin:4px 0 0}
.seen-btn{border:1.5px solid var(--line);border-radius:10px;background:var(--white);font-family:inherit;font-weight:700;font-size:12.5px;padding:8px 13px;cursor:pointer;color:var(--deep-2)}

/* Performance patch RC2.4.3 */
.perf-pane{display:none}
.perf-pane.on{display:block}
.list-meta{display:flex;justify-content:space-between;gap:8px;align-items:center;color:var(--muted);font-size:12px;margin:7px 0}
.load-more{width:100%;border:1.5px solid var(--line);border-radius:11px;background:var(--white);color:var(--deep-2);font-family:inherit;font-weight:800;font-size:13px;padding:11px;margin:6px 0 2px;cursor:pointer}
.load-more:active{background:#FFF7EB}

/* Dashboard heartbeat RC2.4.5 */
.dash-live-alert{position:fixed;left:50%;top:86px;transform:translateX(-50%) translateY(-12px);width:min(720px,calc(100% - 28px));z-index:45;background:#FFF4E4;border:2px solid var(--safety);border-radius:12px;padding:11px 14px;box-shadow:0 5px 18px rgba(22,48,43,.22);opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease}
.dash-live-alert.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.dash-live-alert.dead{background:#FDECEA;border-color:var(--danger)}
.dash-live-alert .ttl{font-size:13px;font-weight:800;color:var(--deep)}
.dash-live-alert.dead .ttl{color:var(--danger)}
.dash-live-alert .msg{font-size:12.5px;color:var(--ink);margin-top:2px;overflow-wrap:anywhere}
.dash-live-alert .meta{font-size:11px;color:var(--muted);margin-top:3px}

</style>
</head>
<body>
<header>
  <div class="hd-inner">
    <div class="hd-title">KỸ THUẬT VẬT TƯ <span class="hd-accent">ICD PHÚC LONG</span></div><button class="logout-btn" id="btnLogout" type="button">Đăng xuất</button>
    <div class="hd-sub" id="hdSub">Đang tải…</div>
    <div class="xe-hero" id="xeHero" style="display:none">
      <span class="code" id="xeCode"></span><span class="loai" id="xeLoai"></span>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
</header>

<div class="dash-live-alert" id="dashLiveAlert" role="alert" aria-live="assertive">
  <div class="ttl" id="dashLiveTitle"></div>
  <div class="msg" id="dashLiveMsg"></div>
  <div class="meta" id="dashLiveMeta"></div>
</div>

<div class="wrap" id="main"><div class="load">Đang tải dữ liệu…</div></div>

<div class="bar" id="bar">
  <div class="bar-inner">
    <div class="sum" id="barSum"><b>0</b> mã vật tư</div>
    <button class="send" id="btnSend" disabled>Gửi phiếu</button>
  </div>
</div>

<div class="overlay show" id="ovAccess">
  <div class="card">
    <div class="big">🔐</div>
    <h2 id="accessTitle">Truy cập hệ thống KTVT</h2>
    <p id="accessDesc">Mật khẩu không được lưu. Sau khi đăng nhập, session token sẽ dùng cho các mục cùng hệ thống đến khi đóng tab hoặc đăng xuất.</p>
    <div class="pin-row">
      <label for="accessPin" id="accessLabel">Mật khẩu truy cập</label>
      <input type="password" id="accessPin" name="ktvt_access_once" inputmode="numeric" maxlength="16" autocomplete="new-password" autocapitalize="off" spellcheck="false" placeholder="••••••••">
      <div class="pin-err" id="accessErr"></div>
    </div>
    <button class="primary" id="btnAccess">Mở hệ thống</button>
  </div>
</div>

<div class="overlay" id="ovConfirm">
  <div class="card">
    <div class="big">🧾</div>
    <h2 id="cfTitle"></h2>
    <div class="summary" id="cfSummary"></div>
    <div class="pin-row" id="pinRow">
      <label for="pin">Mã PIN (hỏi Leon nếu chưa có)</label>
      <input type="password" id="pin" name="ktvt_pin_once" inputmode="numeric" maxlength="8" autocomplete="new-password" autocapitalize="off" spellcheck="false" placeholder="••••••">
      <div class="pin-err" id="pinErr"></div>
    </div>
    <button class="primary" id="btnConfirm">Gửi ngay</button>
    <p style="margin-top:10px"><a href="#" id="btnCancel" style="color:var(--muted)">Quay lại sửa</a></p>
  </div>
</div>

<div class="overlay" id="ovSending">
  <div class="card"><div class="spinner"></div><h2>Đang gửi…</h2><p>Giữ nguyên màn hình, đừng tắt.</p></div>
</div>

<div class="overlay" id="ovDone">
  <div class="card">
    <div class="big" id="doneIcon">✅</div>
    <h2 id="doneTitle"></h2>
    <p id="doneMsg"></p>
    <div id="docLinkWrap"></div>
    <button class="primary" id="btnDoneOk">OK</button>
  </div>
</div>

<script>
// ====== CẤU HÌNH — DÁN URL APPS SCRIPT /exec VÀO ĐÂY ======
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzGJ1NF-pJEh-xPnz_5DhF5CrrvJokInDR34EKQIcvlWhOT5XX5v-AIf83wa8TafhUCnQ/exec";
const APP_VERSION = "2026.07.21-RC2.4.5-DASH-POLL";
// ==========================================================

const mainRoot = () => document.getElementById("main");
// Khi render tab, $("main") trỏ vào pane đang hoạt động; ngoài quá trình render vẫn trỏ root thật.
const $ = id => (id === "main" && window.__ktvtActivePane) ? window.__ktvtActivePane : document.getElementById(id);
const params = new URLSearchParams(location.search);
const XE = (params.get("xe") || "").toUpperCase().trim();
const DASH = (params.get("view") || "").toLowerCase() === "tong";
const MODE = DASH ? "dash" : (XE ? "xe" : "kho");
function initialAccessScope(){
  if(MODE === "kho") return "KHO";
  if(MODE === "dash") return "DASHBOARD";
  // Khi trưởng bộ phận đi từ Dashboard xuống hồ sơ xe trong cùng tab,
  // ưu tiên dùng lại token Dashboard. Người quét QR bình thường dùng scope XE.
  try{
    if(sessionStorage.getItem("ktvt_access_token_DASHBOARD")) return "DASHBOARD";
  }catch(_){ }
  return "XE";
}
const INITIAL_ACCESS_SCOPE = initialAccessScope();

const TO_TRUONG = ["Học (tổ máy XN)","Thông (tổ điện XN)","Ân (tổ máy ĐK)","Dũng (tổ điện ĐK)","Trọng (tổ cơ khí)","Nhi (tổ điện CN)"];
const NHOM_ORDER = ["MÁY XN","ĐIỆN XN","MÁY ĐK","ĐIỆN ĐK","CƠ KHÍ","ĐIỆN CN"];

const state = {
  data:null, tab:null, slip:{}, slipKind:null, pending:null,
  accessToken:"", accessScope:INITIAL_ACCESS_SCOPE, clientId:"", versionOk:false, sending:false,

function stripAccent(s){
  return String(s).normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/đ/g,"d").replace(/Đ/g,"D").toLowerCase();
}
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function todayISO(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+day;
}
function validISODate(iso){
  const m = String(iso||"").match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return false;
  const d = new Date(+m[1], +m[2]-1, +m[3]);
  return d.getFullYear()===+m[1] && d.getMonth()===+m[2]-1 && d.getDate()===+m[3];
}
function isoToVN(iso){
  if(!validISODate(iso)) return "";
  const d = iso.split("-");
  return d[2]+"/"+d[1]+"/"+d[0];
}
function requireDateVN(id){
  const el = $(id);
  const out = isoToVN(el && el.value);
  if(!out){ alert("Chọn ngày phiếu hợp lệ."); if(el) el.focus(); return null; }
  return out;
}
function vnKey(ngay){ const m = String(ngay||"").match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/); return m ? m[3]+m[2].padStart(2,"0")+m[1].padStart(2,"0") : "00000000"; }
function sortKey(h){ return vnKey(h.ngay) + " " + (String(h.ts||"").split(" ")[1] || ""); }

function debounce(fn, wait=100){
  let timer=null;
  return function(...args){ clearTimeout(timer); timer=setTimeout(()=>fn.apply(this,args),wait); };
}
function prepareDataCache(d){
  const stock = d.stock || [];
  stock.forEach(r=>r.key=stripAccent(r.ten+" "+r.ma+" "+(r.macu||"")));
  const h = d.history || {};
  const hx=(h.XUAT||[]).map(x=>({t:"x",ts:x.ts,ngay:x.ngay,vt:x.vt,sl:x.sl,dvt:x.dvt,nguoi:x.nguoi,txnId:x.txnId,refTxnId:x.refTxnId,sub:[x.nguoiNhan?"nhận "+x.nguoiNhan:"",x.hangMuc,x.maXe?"xe "+x.maXe:"",x.ghichu].filter(Boolean).join(" · ")}));
  const hn=(h.NHAP||[]).map(x=>({t:"n",ts:x.ts,ngay:x.ngay,vt:x.vt,sl:x.sl,dvt:x.dvt,nguoi:x.nguoi,txnId:x.txnId,refTxnId:x.refTxnId,sub:x.ghichu||""}));
  const hd=(h.DE_XUAT||[]).map(x=>({t:"d",ts:x.ts,ngay:x.ngay,vt:x.vt,sl:x.sl,dvt:x.dvt,nguoi:x.nguoi,txnId:x.txnId,sub:x.ghichu||""}));
  state.cache = {
    khoHistorySorted:[...hx,...hn,...hd].sort((a,b)=>sortKey(b)>sortKey(a)?1:-1),
    dataSeq:Number(d.latestSeq||0),
    preparedAt:Date.now()
  };
}

function recordRenderMetric(id, started){

function navHTML(cur){

  return ' · ' + L.join(' · ');
}

/* ==================== API / ACCESS / LOAD ==================== */
function randomId(prefix="id"){
  if(window.crypto && crypto.randomUUID) return prefix+"_"+crypto.randomUUID().replace(/-/g,"");
  return prefix+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2);
}
function initClientId(){
  try{
    let id = localStorage.getItem("ktvt_client_id");
    if(!id){ id = randomId("client"); localStorage.setItem("ktvt_client_id", id); }
    return id;
  }catch(_){ return randomId("client"); }
}
state.clientId = initClientId();
function makeRequestId(){ return randomId("req"); }
function authStorageKey(scope=state.accessScope){
  return scope === "XE" ? "ktvt_access_token_XE_" + XE : "ktvt_access_token_" + scope;
}
function readAccessToken(scope=state.accessScope){
  try{return sessionStorage.getItem(authStorageKey(scope))||"";}catch(_){return "";}
}
function saveAccessToken(token,scope=state.accessScope){
  try{sessionStorage.setItem(authStorageKey(scope),token);}catch(_){}
  state.accessToken=token||"";
}
function clearAccessToken(scope=state.accessScope){
  try{sessionStorage.removeItem(authStorageKey(scope));}catch(_){}
  state.accessToken="";
}
function switchAccessScope(scope){
  state.accessScope=scope;
  state.accessToken=readAccessToken(scope);
  configureAccessOverlay();
}
async function rawPost(body, timeoutMs=30000){
  const ctl=new AbortController();const timer=setTimeout(()=>ctl.abort(),timeoutMs);
  try{
    const res=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(body),cache:"no-store",signal:ctl.signal});
    try{return await res.json();}catch(_){throw new Error("Phản hồi backend không phải JSON hợp lệ.");}
  }finally{clearTimeout(timer);}
}
async function apiCall(payload, timeoutMs=30000){
  const body=Object.assign({},payload,{accessToken:state.accessToken,accessScope:state.accessScope,clientId:state.clientId,clientVersion:APP_VERSION});
  if(state.accessScope==="XE" && !body.maXe) body.maXe=XE;
  return rawPost(body,timeoutMs);
}
function configureAccessOverlay(){

    $("accessDesc").textContent="Quyền quản lý cho phép xem Bảng tổng, điều phối, QC và mở hồ sơ tất cả phương tiện trong cùng tab.";

function showAccessError(msg){
  $("accessErr").textContent=msg;$("accessErr").style.display="block";$("accessPin").value="";$("accessPin").focus();
}
function stopDashRefresh(){
  if(state.dashTimer){
    clearInterval(state.dashTimer);
    state.dashTimer=null;
  }
  if(state.dashSafetyTimer){
    clearInterval(state.dashSafetyTimer);
    state.dashSafetyTimer=null;
  }
  state.refreshing=false;

function showDashLiveAlert(event){
  if(MODE!=="dash" || !event) return;
  const seq=Number(event.eventSeq||0);
  if(seq && seq<=state.lastDashAlertSeq) return;
  if(seq) state.lastDashAlertSeq=seq;

  const box=document.getElementById("dashLiveAlert");
  if(!box) return;
  const dead=/chết/i.test(event.tinhTrang||"");
  box.classList.toggle("dead",dead);
  document.getElementById("dashLiveTitle").textContent=(dead?"🔴 XE CHẾT MÁY":"🚨 BÁO HỎNG MỚI")+" — "+(event.maXe||"");
  document.getElementById("dashLiveMsg").textContent=(event.moTa||"Có báo hỏng mới.")+(event.tinhTrang?" · "+event.tinhTrang:"");
  document.getElementById("dashLiveMeta").textContent=[event.nguoi?"Người báo: "+event.nguoi:"",event.maBH||"",event.ts||""].filter(Boolean).join(" · ");
  box.classList.add("show");
  try{if(navigator.vibrate) navigator.vibrate(dead?[250,120,250]:[160]);}catch(_){ }
  if(state.dashAlertTimer) clearTimeout(state.dashAlertTimer);
  state.dashAlertTimer=setTimeout(()=>box.classList.remove("show"),dead?15000:10000);
}
function requireRelogin(msg){
  stopDashRefresh();
  const failedScope=state.accessScope;
  clearAccessToken(failedScope);

  // Hồ sơ xe mở từ Dashboard: nếu token quản lý hết hạn, hạ về login QR XE
  // thay vì giữ người dùng ở một scope không còn hợp lệ.
  if(MODE==="xe" && failedScope==="DASHBOARD"){
    switchAccessScope("XE");
  }

  $("ovAccess").classList.add("show");
  showAccessError(msg||"Phiên đăng nhập không còn hiệu lực. Đăng nhập lại.");
}
async function loginAccess(pin){
  return rawPost({type:"AUTH_LOGIN",accessScope:state.accessScope,maXe:(state.accessScope==="XE"?XE:""),accessPin:pin,clientId:state.clientId,clientVersion:APP_VERSION},30000);
}
async function loadData(){
  if(!state.accessToken){$("ovAccess").classList.add("show");return;}
  window.__ktvtActivePane=null;
  mainRoot().innerHTML='<div class="load">Đang tải dữ liệu…</div>';
  try{
    const j=await apiCall({type:"VIEW"},30000);
    if(["access_required","access_invalid","access_expired","access_forbidden"].includes(j.status)){requireRelogin(j.message);return;}
    if(j.status!=="ok")throw new Error(j.message||"Không tải được dữ liệu.");
    state.data=j;state.versionOk=!j.versionMismatch&&j.version===APP_VERSION;document.documentElement.dataset.appVersion=APP_VERSION;
    prepareDataCache(j);
    resetTabPanes();
    $("ovAccess").classList.remove("show");
    if(!state.versionOk){
      mainRoot().innerHTML='<div class="warn-note"><b>⚠ Phiên bản không đồng bộ.</b><br>Frontend: '+esc(APP_VERSION)+'<br>Backend: '+esc(j.version||"không rõ")+'<br>Không được gửi phiếu. Chờ GitHub/Apps Script deploy xong rồi Ctrl+F5.</div>';
      $("hdSub").textContent="Lệch phiên bản — đã khóa ghi dữ liệu";return;
    }
    initUI();
  }catch(err){
    window.__ktvtActivePane=null;
    mainRoot().innerHTML='<div class="load">Không tải được dữ liệu — '+esc(err&&err.message?err.message:"kiểm tra mạng")+'. <a href="#" onclick="loadData();return false;">Bấm tải lại</a>.</div>';
  }
}

// Tự làm mới Bảng tổng mà không yêu cầu đăng nhập lại trong cùng phiên tab.
// Hàm này bị thiếu ở RC2.4.1-P0 ban đầu, làm trang Kỹ thuật báo
// "refreshViewSilently is not defined" ngay sau khi đăng nhập.
async function refreshViewSilently(){
  if(MODE!=="dash" || !state.accessToken || state.refreshing) return;
  state.refreshing=true;
  try{
    const j=await apiCall({type:"VIEW"},30000);
    if(["access_required","access_invalid","access_expired","access_forbidden"].includes(j.status)){requireRelogin(j.message);return;}
    if(j.status!=="ok") return;
    if(j.versionMismatch || j.version!==APP_VERSION){
      state.versionOk=false;stopDashRefresh();
      window.__ktvtActivePane=null;
      mainRoot().innerHTML='<div class="warn-note"><b>⚠ Phiên bản không đồng bộ.</b><br>Frontend: '+esc(APP_VERSION)+'<br>Backend: '+esc(j.version||"không rõ")+'<br>Đã dừng tự cập nhật và khóa ghi dữ liệu. Ctrl+F5 sau khi deploy hoàn tất.</div>';
      $("hdSub").textContent="Lệch phiên bản — đã khóa ghi dữ liệu";return;
    }

    const prevSeq=Number(state.data&&state.data.latestSeq||0);
    const nextSeq=Number(j.latestSeq||0);
    const day=todayISO();
    const canSkip=prevSeq===nextSeq && state.lastDashRenderDay===day && (Date.now()-state.lastDashRenderAt)<300000;
    if(canSkip){
      state.data.updated=j.updated;
      const updated=document.getElementById("dashUpdated");
      if(updated) updated.firstChild.textContent="Cập nhật "+j.updated;
      return;
    }

    state.data=j;state.versionOk=true;prepareDataCache(j);renderDash();
  }catch(_){
    // Giữ dữ liệu cũ khi mạng chập chờn; tự thử lại ở chu kỳ kế tiếp.
  }finally{state.refreshing=false;}
}

async function pollDashboardEvents(){
  if(MODE!=="dash" || document.hidden || !state.accessToken || state.polling) return;
  state.polling=true;
  try{
    const sinceSeq=Number(state.data&&state.data.latestSeq||0);
    const j=await apiCall({type:"DASH_POLL",sinceSeq:sinceSeq},10000);
    if(["access_required","access_invalid","access_expired","access_forbidden"].includes(j.status)){requireRelogin(j.message);return;}
    if(j.status!=="ok") return;
    if(j.versionMismatch || j.version!==APP_VERSION){
      state.versionOk=false;stopDashRefresh();
      window.__ktvtActivePane=null;
      mainRoot().innerHTML='<div class="warn-note"><b>⚠ Phiên bản không đồng bộ.</b><br>Frontend: '+esc(APP_VERSION)+'<br>Backend: '+esc(j.version||"không rõ")+'<br>Đã dừng tự cập nhật và khóa ghi dữ liệu. Ctrl+F5 sau khi deploy hoàn tất.</div>';
      $("hdSub").textContent="Lệch phiên bản — đã khóa ghi dữ liệu";return;
    }

    const events=Array.isArray(j.events)?j.events:[];
    events.filter(e=>e&&e.type==="BAO_HONG").sort((a,b)=>Number(a.eventSeq||0)-Number(b.eventSeq||0)).forEach(showDashLiveAlert);

    // Chỉ tải VIEW nặng khi sequence thực sự thay đổi.
    if(j.changed || Number(j.latestSeq||0)!==sinceSeq) await refreshViewSilently();
  }catch(_){
    // Heartbeat lỗi tạm thời không xóa dữ liệu hiện có; chu kỳ sau sẽ thử lại.
  }finally{state.polling=false;}
}
function startDashRefresh(){
  if(MODE!=="dash" || document.hidden || !state.accessToken) return;
  if(!state.dashTimer) state.dashTimer=setInterval(pollDashboardEvents,5000);
  // Safety refresh bắt thay đổi do sửa tay trong Sheet, vì sửa tay không tăng eventSeq.
  if(!state.dashSafetyTimer) state.dashSafetyTimer=setInterval(refreshViewSilently,300000);
}

function initUI(){
  const d = state.data;
  if(MODE === "dash"){
    document.body.classList.add("dash");
    $("hdSub").innerHTML = "Bảng theo dõi tổng — kiểm tra báo hỏng mỗi 5 giây" + navHTML("dash");
    renderDash();
    state.lastDashAlertSeq=Number(d.latestSeq||0);
    startDashRefresh();
    setTimeout(pollDashboardEvents,800);
    return;
  }
  if(MODE === "xe"){
    const xe = d.xe.find(x => x.ma === XE);
    if(!xe){
      $("hdSub").textContent = "Không tìm thấy phương tiện " + XE + " trong danh mục.";
      $("main").innerHTML = '<div class="load">Mã phương tiện không có trong hệ thống. Kiểm tra lại QR hoặc báo Leon.</div>';
      return;
    }
    $("hdSub").innerHTML = "Hồ sơ phương tiện" + navHTML("xe");
    $("xeHero").style.display = "flex";
    $("xeCode").textContent = xe.ma;
    $("xeLoai").textContent = xe.loai + (xe.ten ? " · " + xe.ten : "");
    const xeTabs=[["hoso","📋 Hồ sơ"],["baohong","🚨 Báo hỏng"],["suachua","🔧 Sửa chữa"]];
    if(state.accessScope==="DASHBOARD") xeTabs.push(["qc","✅ QC"]);
    xeTabs.push(["baoduong","🛠 Bảo dưỡng"]);
    buildTabs(xeTabs);
  }else{
    $("hdSub").innerHTML = "Kho vật tư sửa chữa" + navHTML("kho");
    buildTabs([["ton","📦 Tồn"],["xuat","📤 Xuất"],["nhap","📥 Nhập"],["dexuat","🧾 Đề xuất"],["lichsu","🕘 Lịch sử"]]);
  }
}

function buildTabs(list){
  const t=$("tabs");t.innerHTML="";resetTabPanes();
  list.forEach(([id,label],i)=>{
    const b=document.createElement("button");b.textContent=label;b.className=i===0?"on":"";
    b.onclick=()=>{t.querySelectorAll("button").forEach(x=>x.classList.remove("on"));b.classList.add("on");openTab(id);};
    t.appendChild(b);
  });
  openTab(list[0][0]);
}

function openTab(id){
  state.tab=id;state.slip={};state.slipKind=null;document.body.classList.remove("adjusting");$("bar").classList.remove("show");
  const fn={hoso:renderHoSo,baohong:renderBaoHong,suachua:renderSuaChua,baoduong:renderBaoDuong,ton:renderTon,xuat:renderXuat,nhap:renderNhap,dexuat:renderDeXuat,lichsu:renderLichSu,qc:renderQC}[id];
  if(!fn) return;

  // Form nhập liệu luôn render mới để không giữ nhầm dữ liệu cũ. Chỉ cache các tab đọc nặng.
  Object.keys(state.panes).forEach(k=>{
    if(!isCacheableTab(k) && k!==id){state.panes[k].remove();delete state.panes[k];}
  });

  if(isCacheableTab(id) && state.panes[id] && !state.tabDirty[id]){
    activatePane(id);window.__ktvtActivePane=null;return;
  }

  if(state.panes[id]){state.panes[id].remove();delete state.panes[id];}
  const pane=document.createElement("div");pane.className="perf-pane on";pane.dataset.tab=id;
  mainRoot().appendChild(pane);state.panes[id]=pane;activatePane(id);
  window.__ktvtActivePane=pane;
  const started=performance.now();
  try{fn();state.tabDirty[id]=false;}finally{window.__ktvtActivePane=null;recordRenderMetric(id,started);}
}

/* ==================== HỒ SƠ XE ==================== */
function repairStatusText(s){
  return s === "CLOSED" ? "QC ĐẠT" : (s === "QC_REJECTED" ? "QC KHÔNG ĐẠT" : "CHỜ QC");
}
function renderHoSo(){
  const d = state.data;
  const hm = d.hangmuc.filter(h => h.maXe === XE);
  const open = d.openBH.filter(o => o.maXe === XE);
  const pending = (d.pendingQC||[]).filter(o=>o.maXe===XE);
  let html = '<div class="warn-note">⚠️ Số liệu ghi nhận từ phiếu — <b>chưa phải kết quả kiểm định</b>. Phiếu sửa chữa chỉ đóng sự cố sau khi QC đạt.</div>';

  if(open.length){
    html += '<div class="sec-t">SỰ CỐ ĐANG MỞ <span class="tag open">' + open.length + '</span></div>';
    open.forEach(o=>{
      html += '<div class="hist-row neg"><div class="top"><span><span class="hist-tag bh">MỞ</span>' + esc(o.tinhTrang||"") + '</span><b>' + esc(o.maBH) + '</b></div>'
            + '<div class="sub">Ngày ' + esc(o.ngay) + ' · ' + esc(o.nguoi) + ' · ' + esc(o.moTa) + ' · Txn '+esc(o.txnId||"")+'</div></div>';
    });
  }
  if(pending.length){
    html += '<div class="sec-t">CHỜ QC <span class="tag open">'+pending.length+'</span></div>';
    pending.forEach(r=>{
      html += '<div class="hist-row"><div class="top"><span><span class="hist-tag sc">CHỜ QC</span>'+esc(r.noiDung)+'</span><b>'+esc(r.repairId)+'</b></div>'
        +'<div class="sub">Ngày '+esc(r.ngay)+' · '+esc(r.nguoi)+(r.maBH?' · sự cố '+esc(r.maBH):'')+'</div></div>';
    });
  }

  html += '<div class="sec-t">HẠN BẢO DƯỠNG (cập nhật ' + esc(d.updated) + ')</div>';
  if(!hm.length) html += '<div class="empty-note">Chưa khai báo hạng mục bảo dưỡng cho phương tiện này.</div>';
  hm.forEach(h=>{
    let due, over = false;
    if(h.noBase){
      due = '<span class="tag nobase">CHƯA CÓ MỐC GỐC</span>';
    }else if(h.loai === "GIO"){
      due = 'Gần nhất <b>' + h.lastGio + 'h</b>' + (h.lastNgay ? ' (' + esc(h.lastNgay) + ')' : '')
          + ' → kỳ tới <b>' + h.nextGio + 'h</b>';

  d.history.BAO_DUONG.filter(r=>r.maXe===XE).forEach(r=>ev.push({t:"bd",ts:r.ts,ngay:r.ngay,top:esc(r.hangMuc),val:(r.soGio!=null?r.soGio+"h":""),sub:"Ngày "+esc(r.ngay)+" · "+esc(r.nguoi)+(r.ghichu?" · "+esc(r.ghichu):"")+" · "+esc(r.txnId||"")}));

/* ==================== SLIP VẬT TƯ dùng chung ==================== */
function slipSearchHTML(idPrefix){
  return '<div class="search-box"><input type="search" id="'+idPrefix+'Q" placeholder="Gõ tên vật tư… (không dấu cũng được)" autocomplete="off"></div>'
       + '<div class="hint">Bấm vào vật tư để thêm vào phiếu.</div><div id="'+idPrefix+'Res"></div>';
}
function bindSlipSearch(idPrefix){
  $(idPrefix+"Q").addEventListener("input", ()=>renderSlipSearch(idPrefix));
}
function isIssueFlow(){ return state.tab === "xuat"; }
function isAdjustmentOn(){ return !!($("adjChk") && $("adjChk").checked); }
function stockByMa(ma){
  const it = state.data && state.data.stock ? state.data.stock.find(x=>x.ma===ma) : null;
  return it ? Number(it.ton || 0) : 0;
}
function validateStockAvailability(list, isAdjustment){
  if(!isIssueFlow() || isAdjustment) return true;
  const shortage = list.filter(r=>Number(r.qty) > stockByMa(r.ma));
  if(!shortage.length) return true;
  alert("Không đủ tồn kho:\n" + shortage.map(r=>"• "+r.ten+": cần "+r.qty+" "+r.dvt+", hiện còn "+stockByMa(r.ma)).join("\n") + "\n\nPhiếu chưa được gửi.");
  return false;
}
function renderSlipSearch(idPrefix){
  const q = stripAccent($(idPrefix+"Q").value.trim());
  const box = $(idPrefix+"Res");
  box.innerHTML = "";
  if(!q) return;
  const hits = state.data.stock.filter(it=>it.key.includes(q)).slice(0,20);
  if(!hits.length){ box.innerHTML = '<div class="empty-note">Không tìm thấy — thử gõ ngắn hơn. Danh mục vật tư chưa import thì báo Leon.</div>'; return; }
  hits.forEach(it=>{
    const added = !!state.slip[it.ma];
    const outOfStock = isIssueFlow() && !isAdjustmentOn() && Number(it.ton) <= 0;
    const div = document.createElement("div");
    div.className = "item"+(added?" added":"")+(outOfStock && !added?" out-of-stock":"");
    const buttonText = added ? "✓" : (outOfStock ? "Hết" : "+");
    div.innerHTML = '<div><div class="nm">'+esc(it.ten)+'</div><div class="cd">'+esc(it.ma)+' · '+esc(it.dvt)+' · Tồn '+it.ton+'</div></div><button class="add">'+buttonText+'</button>';
    div.onclick = ()=>{
      if(state.slip[it.ma]){
        // Bấm lần hai vào thẻ đã chọn = bỏ khỏi phiếu.
        delete state.slip[it.ma];
      }else{
        if(outOfStock){
          alert('Vật tư "'+it.ten+'" hiện tồn '+it.ton+' '+it.dvt+'. Không thể xuất thêm. Nếu số thực tế khác, kiểm kê và lập phiếu điều chỉnh trước.');
          return;
        }
        state.slip[it.ma] = {ma:it.ma,ten:it.ten,dvt:it.dvt,qty:1};
      }
      renderSlipRows(); renderSlipSearch(idPrefix);
    };
    box.appendChild(div);
  });
}
function slipBoxHTML(title){
  return '<div class="fbox slipbox"><div class="fbox-head"><span id="slipTitle">'+title+'</span><span class="badge" id="slipCount">0 mã</span></div><div id="slipRows"><div class="slip-empty">Chưa có vật tư nào. Tìm và bấm chọn ở trên.</div></div>';
}
function setQty(ma, v){
  v = parseInt(v,10);
  const adj = isAdjustmentOn();
  if(isNaN(v)) v = 1;
  if(v === 0) v = adj ? -1 : 1;
  if(!adj && v < 1) v = 1;
  if(v > 9999) v = 9999; if(v < -9999) v = -9999;
  if(isIssueFlow() && !adj){
    const ton = stockByMa(ma);
    if(ton <= 0){
      alert("Vật tư này hiện không còn tồn để xuất.");
      delete state.slip[ma];
      renderSlipRows();
      return;
    }
    if(v > ton){
      alert("Số lượng tối đa có thể xuất theo tồn hiện tại là "+ton+".");
      v = ton;
    }
  }
  state.slip[ma].qty = v; renderSlipRows();
}
function renderSlipRows(){
  const rows = $("slipRows"); if(!rows) return;
  const list = Object.values(state.slip);
  $("slipCount").textContent = list.length + " mã";
  $("barSum").innerHTML = state.tab === "suachua" && list.length === 0
    ? "<b>Không dùng vật tư</b>"
    : "<b>"+list.length+"</b> mã vật tư";
  const allowNoMaterialRepair = state.tab === "suachua" && !isAdjustmentOn();
  $("btnSend").disabled = list.length === 0 && !allowNoMaterialRepair;
  if(!list.length){ rows.innerHTML = '<div class="slip-empty">Chưa có vật tư nào. Tìm và bấm chọn ở trên.</div>'; return; }
  rows.innerHTML = "";
  list.forEach(r=>{
    const d = document.createElement("div");
    d.className = "slip-row";
    d.innerHTML = '<div class="info"><div class="nm">'+esc(r.ten)+'</div><div class="cd">'+esc(r.ma)+' · '+esc(r.dvt)+'</div></div>'
      +'<div class="qty"><button aria-label="Giảm">−</button><input type="number" inputmode="numeric" value="'+r.qty+'"><button aria-label="Tăng">+</button></div>'
      +'<button class="rm" aria-label="Xóa">✕</button>';
    const [minus, plus] = d.querySelectorAll(".qty button");
    minus.onclick = ()=>setQty(r.ma, r.qty-1);
    plus.onclick = ()=>setQty(r.ma, r.qty+1);
    d.querySelector(".qty input").onchange = e=>setQty(r.ma, e.target.value);
    d.querySelector(".rm").onclick = ()=>{
      delete state.slip[r.ma];
      renderSlipRows();
      const prefix = state.tab === "suachua" ? "sc" : (state.tab === "xuat" ? "xk" : (state.tab === "nhap" ? "nh" : "dx"));
      if($(prefix+"Q")) renderSlipSearch(prefix);
    };
    rows.appendChild(d);
  });
}
function adjustRowHTML(){
  return '<label class="frow adjust-row" for="adjChk" style="cursor:pointer;user-select:none">'
    +'<input type="checkbox" id="adjChk"><div><div class="lbl">Phiếu điều chỉnh (đảo giao dịch đã gửi sai)</div>'
    +'<div class="sub">Hệ thống tự đổi số lượng sang ÂM. Bắt buộc nhập Mã giao dịch gốc và ghi rõ lý do.</div></div></label>'
    +'<div class="frow" id="adjRefRow" style="display:none"><label>Mã giao dịch gốc <span style="color:var(--danger)">*</span></label>'
    +'<input type="text" id="adjRefTxn" placeholder="Vd: PX-20260720-101530-ABC123 hoặc PN-..."></div>';
}
function bindAdjust(){
  $("adjChk").onchange = ()=>{
    const on = $("adjChk").checked;
    document.body.classList.toggle("adjusting", on);
    if($("adjRefRow")) $("adjRefRow").style.display = on ? "block" : "none";
    Object.values(state.slip).forEach(r=>{
      r.qty = on ? -Math.max(1,Math.abs(Number(r.qty)||1)) : Math.max(1,Math.abs(Number(r.qty)||1));
    });
    renderSlipRows();
    const prefix = state.tab === "xuat" ? "xk" : (state.tab === "nhap" ? "nh" : "dx");
    if($(prefix+"Q")) renderSlipSearch(prefix);
  };
}
function requireAdjustmentRef(isAdjustment){
  if(!isAdjustment) return "";
  const v = $("adjRefTxn") ? $("adjRefTxn").value.trim() : "";
  if(!v){ alert("Phiếu điều chỉnh bắt buộc nhập Mã giao dịch gốc."); if($("adjRefTxn")) $("adjRefTxn").focus(); return null; }
  return v;
}
function validateSlipSign(list, isAdjustment){
  if(isAdjustment && list.some(r=>r.qty>=0)){
    alert("Phiếu điều chỉnh bắt buộc tất cả số lượng là số ÂM.");
    return false;
  }
  if(!isAdjustment && list.some(r=>r.qty<=0)){
    alert("Phiếu thường bắt buộc tất cả số lượng là số DƯƠNG.");
    return false;
  }
  return true;
}

  if(!history.length)histHtml='<div class="empty-note">Chưa có lịch sử QC cho phương tiện này.</div>';
  $("main").innerHTML=
    '<div class="warn-note">✅ Mỗi lần QC sẽ ghi một dòng độc lập vào <b>QC_RESP</b>. Đạt → CLOSED. Không đạt → trả sửa, sự cố vẫn mở.</div>'

/* ==================== DASHBOARD TỔNG (?view=tong) ==================== */
function parseVN(s){ const m = String(s||"").match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/); return m ? new Date(+m[3], +m[2]-1, +m[1]) : null; }
function ageDays(ngayVN){
  const d = parseVN(ngayVN); if(!d) return 0;
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.max(0, Math.round((t - d) / 86400000));
}
function renderDash(){
  state.lastDashRenderSeq=Number(state.data&&state.data.latestSeq||0);
  state.lastDashRenderDay=todayISO();
  state.lastDashRenderAt=Date.now();
  const d=state.data,todayVN=isoToVN(todayISO());
  const latestSeq=Math.max(0,Number(d.latestSeq||0));let seen=latestSeq;
  try{const raw=localStorage.getItem("ktvt_seen_seq");if(raw===null)localStorage.setItem("ktvt_seen_seq",String(latestSeq));else seen=Math.max(0,parseInt(raw,10)||0);if(latestSeq<seen){seen=latestSeq;localStorage.setItem("ktvt_seen_seq",String(latestSeq));}}catch(_){seen=latestSeq;}
  const fresh=Math.max(0,latestSeq-seen);document.title=(fresh?"("+fresh+") ":"")+"Kỹ thuật vật tư — ICD Phúc Long";

  const open=d.openBH.map(o=>({...o,age:ageDays(o.ngay),dead:/chết/i.test(o.tinhTrang||"")})).sort((a,b)=>b.age-a.age);
  const pendingQC=(d.pendingQC||[]).slice().sort((a,b)=>sortKey(b)>sortKey(a)?1:-1);
  const deadXe={},warnXe={},oldestXe={};open.forEach(o=>{if(o.dead)deadXe[o.maXe]=true;else warnXe[o.maXe]=true;if(oldestXe[o.maXe]==null||o.age>oldestXe[o.maXe])oldestXe[o.maXe]=o.age;});
  const lich=d.hangmuc.filter(h=>h.loai!=="GIO"&&!h.noBase),over=lich.filter(h=>h.overdue).sort((a,b)=>a.daysLeft-b.daysLeft),soon=lich.filter(h=>!h.overdue&&h.daysLeft<=7).sort((a,b)=>a.daysLeft-b.daysLeft),gio=d.hangmuc.filter(h=>h.loai==="GIO"),low=d.stock.filter(r=>r.min>0&&r.ton<=r.min);

  const acts=[];
  d.history.BAO_HONG.forEach(r=>acts.push({t:"bh",ts:r.ts,ngay:r.ngay,tag:'<span class="hist-tag bh">BÁO HỎNG</span>',top:esc(r.maXe)+" · "+esc(r.tinhTrang),sub:esc(r.nguoi)+" · "+esc(r.moTa)+" · "+esc(r.txnId||"")}));

  acts.sort((a,b)=>sortKey(b)>sortKey(a)?1:-1);state.dashActs=acts;const todayCount=acts.filter(a=>a.ngay===todayVN).length;

  html+='<div class="sec-t">MỐC GIỜ MÁY</div><table class="gio-table"><tr><th>Xe</th><th>Hạng mục</th><th>Mốc gần nhất</th><th>Kỳ tới</th></tr>';
  gio.forEach(h=>{html+='<tr><td><b>'+esc(h.maXe)+'</b></td><td>'+esc(h.hangMuc)+'</td>'+(h.noBase?'<td colspan="2"><span class="tag nobase">CHƯA CÓ MỐC</span></td>':'<td>'+h.lastGio+'h'+(h.lastNgay?' ('+esc(h.lastNgay)+')':'')+'</td><td><b>'+h.nextGio+'h</b></td>')+'</tr>';});html+='</table>';
  if(low.length){html+='<div class="sec-t">VẬT TƯ DƯỚI NGƯỠNG ('+low.length+')</div>';low.forEach(r=>{html+='<div class="stock-row low"><div><div class="nm">'+esc(r.ten)+'</div><div class="cd">'+esc(r.ma)+' · Min '+r.min+'</div></div><div class="ton">'+r.ton+' <small>'+esc(r.dvt)+'</small></div></div>';});}

  html+='<div class="sec-t">NHẬT KÝ HOẠT ĐỘNG — hôm nay '+todayCount+' phiếu</div><div class="chips" id="daChips"><button data-t="all">Tất cả</button><button data-t="bh">Báo hỏng</button><button data-t="x">Xuất</button><button data-t="sc">Sửa chữa</button><button data-t="qc">QC</button><button data-t="n">Nhập</button><button data-t="bd">Bảo dưỡng</button><button data-t="d">Đề xuất</button></div>'
    +'<div class="search-box" style="display:flex;gap:8px;padding-top:0"><input type="date" id="daDate" style="flex:1;border:2px solid var(--line);border-radius:12px;padding:10px 12px;font-family:inherit;font-size:15px;background:var(--white)"><button id="daDateAll" class="seen-btn">Mọi ngày</button></div><div class="hint">Không lọc ngày: 50 dòng gần nhất.</div><div id="daList"></div>';
  $("main").innerHTML=html;
  document.querySelectorAll("#daChips button").forEach(b=>{b.classList.toggle("on",b.dataset.t===state.daType);b.onclick=()=>{state.daType=b.dataset.t;document.querySelectorAll("#daChips button").forEach(x=>x.classList.toggle("on",x===b));renderDaList();};});
  if(state.daDate)$("daDate").value=state.daDate;$("daDate").addEventListener("change",()=>{state.daDate=$("daDate").value;renderDaList();});$("daDateAll").onclick=()=>{state.daDate="";$("daDate").value="";renderDaList();};
  function renderDaList(){let list=state.dashActs.filter(a=>state.daType==="all"||a.t===state.daType);const df=$("daDate").value;if(df)list=list.filter(a=>a.ngay===isoToVN(df));else list=list.slice(0,50);const box=$("daList");box.innerHTML="";if(!list.length){box.innerHTML='<div class="empty-note">Không có phiếu khớp bộ lọc.</div>';return;}list.forEach(a=>box.insertAdjacentHTML("beforeend",'<div class="hist-row'+(a.neg?' neg':'')+'"><div class="top"><span>'+a.tag+a.top+'</span><b>'+esc(a.ngay)+'</b></div><div class="sub">Gửi '+esc(a.ts)+' · '+a.sub+'</div></div>'));}
  renderDaList();$("btnSeen").onclick=()=>{try{localStorage.setItem("ktvt_seen_seq",String(latestSeq));}catch(_){}renderDash();};
}

/* ==================== NHẬP KHO (PIN_VAN) ==================== */
function renderNhap(){
  $("main").innerHTML =
    slipSearchHTML("nh")
   + slipBoxHTML("PHIẾU NHẬP KHO")
   +'<div class="frow"><label>Người gửi</label><input type="text" id="nhNguoi" value="Vân"></div>'
   +'<div class="frow"><label>Ngày</label><input type="date" id="nhNgay" required value="'+todayISO()+'"></div>'
   +'<div class="frow"><label>Ghi chú</label><input type="text" id="nhNote" placeholder="(không bắt buộc)"></div>'
   + adjustRowHTML()
   +'</div>';
  bindSlipSearch("nh"); bindAdjust();
  $("bar").classList.add("show");
  const btn = $("btnSend");
  btn.textContent = "Gửi phiếu"; btn.disabled = true;
  renderSlipRows();
  btn.onclick = ()=>{
    const list = Object.values(state.slip);
    if(!list.length) return;
    const isAdjustment = $("adjChk").checked;
    const refTxnId = requireAdjustmentRef(isAdjustment); if(refTxnId===null) return;
    if(!validateSlipSign(list, isAdjustment)) return;
    if(!$("nhNguoi").value.trim()){ alert("Ghi tên người gửi."); return; }
    if(isAdjustment && !$("nhNote").value.trim()){ alert("Phiếu điều chỉnh bắt buộc ghi chú lý do."); return; }
    const ngay = requireDateVN("nhNgay"); if(!ngay) return;
    openConfirm({
      title: "Xác nhận PHIẾU "+(isAdjustment?"ĐIỀU CHỈNH ":"")+"NHẬP KHO",
      summary: list.map(r=>"• "+esc(r.ten)+" — <b>"+r.qty+" "+esc(r.dvt)+"</b>").join("<br>"),
      needPin: "VAN",
      payload: { type:"NHAP", nguoi:$("nhNguoi").value.trim(), note:$("nhNote").value.trim(),
                 date:ngay, isAdjustment:isAdjustment, refTxnId:refTxnId, items:list.map(r=>({ma:r.ma,ten:r.ten,dvt:r.dvt,qty:r.qty})) },
      doneMsg: j=> "Đã ghi phiếu "+(j.phieuId||j.txnId||"")+" với "+list.length+" mã nhập.",
      after: ()=>{ loadData(); }
    });
  };
}

   +'<div class="frow"><label>V/v — lý do đề xuất (nên ghi rõ)</label><input type="text" id="dxNote" placeholder="Vd: bổ sung vật tư sửa NB05"></div>'
   +'<div class="frow"><label>Ngày</label><input type="date" id="dxNgay" required value="'+todayISO()+'"></div>'
   +'<div class="frow"><div class="hint" style="margin:0">Đề xuất là xin cấp — <b>không cộng vào tồn kho</b>. Phiếu in vẫn ký duyệt giấy như quy trình.</div></div>'
   +'</div>';
  bindSlipSearch("dx");
  $("dxNguoi").onchange = ()=>{ $("dxNguoiKhac").style.display = $("dxNguoi").value==="__khac" ? "block" : "none"; };
  $("bar").classList.add("show");
  const btn = $("btnSend");
  btn.textContent = "Gửi đề xuất"; btn.disabled = true;
  renderSlipRows();
  btn.onclick = ()=>{
    const list = Object.values(state.slip);
    if(!list.length) return;
    if(!validateSlipSign(list, false)) return;
    let nguoi = $("dxNguoi").value === "__khac" ? $("dxNguoiKhac").value.trim() : $("dxNguoi").value;
    if(!nguoi){ alert("Chọn người đề xuất."); return; }
    const ngay = requireDateVN("dxNgay"); if(!ngay) return;
    openConfirm({
      title: "Xác nhận PHIẾU ĐỀ XUẤT",
      summary: "Người đề xuất: <b>"+esc(nguoi)+"</b><br>" + list.map(r=>"• "+esc(r.ten)+" — <b>"+r.qty+" "+esc(r.dvt)+"</b>").join("<br>"),
      needPin: "DX",
      payload: { type:"DE_XUAT", nguoi:nguoi, note:$("dxNote").value.trim(), date:ngay,
                 items:list.map(r=>({ma:r.ma,ten:r.ten,dvt:r.dvt,qty:r.qty})) },
      doneMsg: j => "Đã ghi đề xuất "+(j.dxId||j.txnId||"")+"." + (j.warn ? " " + j.warn : ""),
      after: ()=>{ loadData(); }
    });
  };
}

/* ==================== CONFIRM + GỬI ==================== */
function clearPin(){ const pin=$("pin"); if(pin) pin.value=""; }
function openConfirm(cfg){
  if(!state.versionOk){ alert("Phiên bản chưa đồng bộ; không được gửi phiếu."); return; }
  if(!cfg.payload.requestId) cfg.payload.requestId = makeRequestId();
  state.pending=cfg;
  $("cfTitle").textContent=cfg.title;
  $("cfSummary").innerHTML=cfg.summary+'<br><span style="font-size:11px;color:var(--muted)">Request ID: '+esc(cfg.payload.requestId)+'</span>';
  $("pinErr").style.display="none";clearPin();
  $("pinRow").style.display=cfg.needPin?"block":"none";
  $("btnConfirm").disabled=false;$("btnConfirm").textContent="Gửi ngay";
  $("ovConfirm").classList.add("show");
}
$("btnCancel").onclick=e=>{e.preventDefault();clearPin();state.pending=null;$("ovConfirm").classList.remove("show");};

async function sendPending(){
  const cfg=state.pending;if(!cfg||state.sending)return;
  const payload=Object.assign({},cfg.payload);
  if(cfg.needPin){
    const pinVal=$("pin").value.trim();
    if(!pinVal){$("pinErr").textContent="Nhập mã PIN trước khi gửi.";$("pinErr").style.display="block";return;}
    payload.pin=pinVal;
  }
  state.sending=true;$("btnConfirm").disabled=true;$("btnConfirm").textContent="Đang gửi…";
  clearPin();$("ovConfirm").classList.remove("show");$("ovSending").classList.add("show");
  try{
    const j=await apiCall(payload,30000);
    $("ovSending").classList.remove("show");
    if(["access_required","access_invalid","access_expired","access_forbidden"].includes(j.status)){state.sending=false;$("ovSending").classList.remove("show");requireRelogin(j.message);return;}
    if(j.status==="wrong_pin"||j.status==="locked"){
      state.sending=false;clearPin();
      $("pinErr").textContent=j.status==="locked"?"Thiết bị bị khóa tạm thời. Thử lại sau "+Math.ceil((j.retryAfter||60)/60)+" phút.":"Mã PIN không đúng — nhập lại.";
      $("pinErr").style.display="block";$("btnConfirm").disabled=false;$("btnConfirm").textContent="Gửi ngay";$("ovConfirm").classList.add("show");return;
    }
    if(j.status==="version_mismatch"){
      state.versionOk=false;state.sending=false;showDefiniteFail(j,"Phiên bản không đồng bộ; đã khóa gửi phiếu.");return;
    }
    if(j.status==="ok"){
      state.sending=false;clearPin();
      $("doneIcon").textContent=j.replay?"🛡️":"✅";
      $("doneTitle").textContent=j.replay?"Phiếu đã tồn tại — không ghi trùng":"Đã gửi thành công";
      $("doneMsg").textContent=cfg.doneMsg(j||{})+(j.txnId?" Mã giao dịch: "+j.txnId+".":"")+(j.recovered?" Hệ thống đã khôi phục kết quả từ lần gửi trước.":"");
      $("docLinkWrap").innerHTML=j.docUrl?'<a href="'+esc(j.docUrl)+'" target="_blank" rel="noopener" class="doc-link">🖨 Mở phiếu đề xuất</a>':"";
      $("btnDoneOk").textContent="OK";
      $("btnDoneOk").onclick=()=>{clearPin();state.pending=null;$("ovDone").classList.remove("show");if(cfg.after)cfg.after();};
      $("ovDone").classList.add("show");return;
    }
    state.sending=false;showDefiniteFail(j);
  }catch(err){
    state.sending=false;clearPin();$("ovSending").classList.remove("show");
    // Không biết backend đã ghi hay chưa. Giữ nguyên requestId để retry an toàn.
    $("doneIcon").textContent="❓";$("doneTitle").textContent="Chưa xác định kết quả";
    $("doneMsg").textContent=(err&&err.name==="AbortError"?"Backend phản hồi quá 30 giây.":"Mạng bị gián đoạn.")+" Không lập phiếu mới. Nhập lại PIN và thử lại bằng đúng Request ID; backend sẽ không ghi trùng.";
    $("docLinkWrap").innerHTML="";$("btnDoneOk").textContent="Nhập PIN và thử lại an toàn";
    $("btnDoneOk").onclick=()=>{$("ovDone").classList.remove("show");$("btnConfirm").disabled=false;$("btnConfirm").textContent="Gửi lại an toàn";$("pinErr").textContent="Đang dùng lại Request ID cũ để chống ghi trùng.";$("pinErr").style.display="block";$("ovConfirm").classList.add("show");};
    $("ovDone").classList.add("show");
  }
}
$("btnConfirm").onclick=sendPending;
function showDefiniteFail(j,extra){
  clearPin();$("ovSending").classList.remove("show");$("docLinkWrap").innerHTML="";
  $("doneIcon").textContent="⚠️";$("doneTitle").textContent="Phiếu chưa được ghi";
  $("doneMsg").textContent=(j&&j.message?j.message:"Backend từ chối request.")+(extra?" "+extra:"")+(j&&j.txnId?" Txn: "+j.txnId:"");
  $("btnDoneOk").textContent="Quay lại";$("btnDoneOk").onclick=()=>{state.pending=null;$("ovDone").classList.remove("show");};$("ovDone").classList.add("show");
}

/* ==================== ACCESS SESSION — KHÔNG LƯU MẬT KHẨU ==================== */
configureAccessOverlay();
state.accessToken=readAccessToken(state.accessScope);
$("btnAccess").onclick=async()=>{
  const v=$("accessPin").value.trim();
  if(!v){showAccessError("Nhập mật khẩu truy cập.");return;}
  $("accessPin").value="";$("accessErr").style.display="none";$("btnAccess").disabled=true;$("btnAccess").textContent="Đang kiểm tra…";
  try{
    const j=await loginAccess(v);
    if(j.status==="wrong_pin"||j.status==="locked"){showAccessError(j.status==="locked"?"Thiết bị bị khóa tạm thời. Thử lại sau "+Math.ceil((j.retryAfter||60)/60)+" phút.":"Mật khẩu truy cập không đúng.");return;}
    if(j.status!=="ok"||!j.accessToken){showAccessError(j.message||"Không tạo được phiên đăng nhập.");return;}
    saveAccessToken(j.accessToken,state.accessScope);$("ovAccess").classList.remove("show");await loadData();
  }catch(err){showAccessError(err&&err.message?err.message:"Không kết nối được backend.");}
  finally{$("btnAccess").disabled=false;$("btnAccess").textContent="Mở hệ thống";}
};
$("accessPin").addEventListener("keydown",e=>{if(e.key==="Enter")$("btnAccess").click();});
$("btnLogout").onclick=()=>{stopDashRefresh();clearAccessToken(state.accessScope);location.reload();};
window.addEventListener("focus",()=>{if(MODE==="dash"){startDashRefresh();pollDashboardEvents();}});
document.addEventListener("visibilitychange",()=>{
  if(MODE!=="dash") return;
  if(document.hidden) stopDashRefresh();
  else{startDashRefresh();pollDashboardEvents();}
});

if(state.accessToken){$("ovAccess").classList.remove("show");loadData();}
else{$("ovAccess").classList.add("show");}
</script>
