<input
  type="password"
  id="pin"
  name="ktvt_transaction_pin"
  inputmode="numeric"
  maxlength="8"
  autocomplete="new-password"
  data-lpignore="true"
  data-1p-ignore="true"
  placeholder="••••••">

<script>
/* =====================================================================
 BLOCK HTML-2 — THAY TOÀN BỘ function renderSuaChua() HIỆN TẠI
 ====================================================================== */
function renderSuaChua(){
  // Xóa slip vật tư có thể còn từ tab trước; sửa chữa không được mang vật tư theo.
  state.slip = {};
  document.body.classList.remove("adjusting");

  const open = state.data.openBH.filter(o=>o.maXe===XE);
  const bhOpts = '<option value="">Không tham chiếu</option>'
    + open.map(o=>'<option value="'+esc(o.maBH)+'">'
      +esc(o.maBH)+' — '+esc(o.moTa).slice(0,40)+'</option>').join("");

  $("main").innerHTML =
    '<div class="warn-note">'
    + 'Phiếu <b>SỬA CHỮA chỉ xác nhận công việc kỹ thuật</b>, không trừ tồn kho. '
    + 'Vật tư đã được thủ kho xuất ở tab <b>Xuất</b>; không chọn hoặc nhập lại vật tư tại đây.'
    + '</div>'
    + '<div class="fbox"><div class="fbox-head"><span>PHIẾU SỬA CHỮA — '+esc(XE)+'</span></div>'
    + '<div class="frow"><label>Sự cố tham chiếu</label><select id="scBH">'+bhOpts+'</select></div>'
    + '<div class="frow"><label>Người sửa / người xác nhận</label>'
    + '<input type="text" id="scNguoi" placeholder="Vd: Học, Ân, Trọng…"></div>'
    + '<div class="frow"><label>Ngày</label>'
    + '<input type="date" id="scNgay" required value="'+todayISO()+'"></div>'
    + '<div class="frow"><label>Mã phiếu xuất / vật tư đã nhận (nếu có)</label>'
    + '<input type="text" id="scPX" placeholder="Vd: PX-200726-01 hoặc ghi vật tư Vân đã cấp"></div>'
    + '<div class="frow"><label>Nội dung sửa chữa đã thực hiện</label>'
    + '<textarea id="scNote" placeholder="Vd: thay đèn sau, siết bulông chân máy, căn chỉnh công tắc hành trình…"></textarea></div>'
    + '</div>';

  $("bar").classList.add("show");
  $("barSum").innerHTML = "<b>Xác nhận kỹ thuật</b> · không trừ tồn";

  const btn = $("btnSend");
  btn.textContent = "Gửi xác nhận";
  btn.disabled = false;

  btn.onclick = ()=>{
    const nguoi = $("scNguoi").value.trim();
    const note = $("scNote").value.trim();
    const pxRef = $("scPX").value.trim();

    if(!nguoi){ alert("Ghi tên người sửa/người xác nhận."); return; }
    if(!note){ alert("Bắt buộc ghi nội dung sửa chữa đã thực hiện."); return; }

    const ngay = requireDateVN("scNgay");
    if(!ngay) return;

    openConfirm({
      title: "Xác nhận PHIẾU SỬA CHỮA — "+XE,
      summary:
        "• Người sửa: <b>"+esc(nguoi)+"</b>"
        + "<br>• Nội dung: "+esc(note)
        + (pxRef ? "<br>• Tham chiếu phiếu xuất: <b>"+esc(pxRef)+"</b>" : "")
        + ($("scBH").value ? "<br>• Đóng sự cố: <b>"+esc($("scBH").value)+"</b>" : "")
        + "<br>• <b>Tồn kho không thay đổi</b>",
      needPin: "SUACHUA",
      payload: {
        type: "SUA_CHUA",
        maXe: XE,
        nguoi: nguoi,
        maBH: $("scBH").value,
        hangMuc: (state.data.xe.find(x=>x.ma===XE)||{}).loai || "",
        nguoiNhan: nguoi,
        phieuXuatRef: pxRef,
        note: note,
        date: ngay,
        isAdjustment: false,
        items: []
      },
      doneMsg: ()=> "Đã ghi xác nhận sửa chữa cho "+XE+". Tồn kho không thay đổi.",
      after: ()=>{ loadData(); }
    });
  };
}

/* =====================================================================
 BLOCK HTML-3 — THAY TOÀN BỘ KHỐI TỪ:
   function pinKey(k){ ... }
 ĐẾN HẾT:
   function showFail(j){ ... }
 BẰNG KHỐI DƯỚI ĐÂY
 ====================================================================== */

// Xóa PIN từng được lưu bởi các phiên bản cũ; không xóa key ktvt_seen_seq của dashboard.
(function purgeLegacySavedPins(){
  try{
    [
      "ktvt_pin_VAN",
      "ktvt_pin_BINH",
      "ktvt_pin_DX",
      "ktvt_pin_SC",
      "ktvt_pin_SUACHUA"
    ].forEach(k=>localStorage.removeItem(k));
  }catch(_){ }
})();

function clearPin(){
  const el = $("pin");
  if(el) el.value = "";
}

function openConfirm(cfg){
  state.pending = cfg;
  $("cfTitle").textContent = cfg.title;
  $("cfSummary").innerHTML = cfg.summary;
  $("pinErr").textContent = "";
  $("pinErr").style.display = "none";

  clearPin(); // Mỗi phiếu bắt buộc nhập lại từ đầu.
  $("pinRow").style.display = cfg.needPin ? "block" : "none";
  $("ovConfirm").classList.add("show");

  if(cfg.needPin){
    setTimeout(()=>{ try{ $("pin").focus(); }catch(_){ } }, 0);
  }
}

$("btnCancel").onclick = e=>{
  e.preventDefault();
  clearPin();
  state.pending = null;
  $("ovConfirm").classList.remove("show");
};

$("btnConfirm").onclick = async ()=>{
  const cfg = state.pending;
  if(!cfg) return;

  const payload = Object.assign({}, cfg.payload);
  if(cfg.needPin){
    const pinVal = $("pin").value.trim();
    if(!pinVal){
      $("pinErr").textContent = "Nhập mã PIN trước khi gửi.";
      $("pinErr").style.display = "block";
      return;
    }
    payload.pin = pinVal;
  }

  $("ovConfirm").classList.remove("show");
  $("ovSending").classList.add("show");

  try{
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(payload),
      cache: "no-store"
    });

    let j = null;
    let ok = res.ok;
    let wrongPin = false;
    try{
      j = await res.json();
      ok = j.status === "ok";
      wrongPin = j.status === "wrong_pin";
    }catch(_){ }

    $("ovSending").classList.remove("show");
    clearPin();

    if(wrongPin){
      $("pinErr").textContent = "Mã PIN không đúng — nhập lại.";
      $("pinErr").style.display = "block";
      $("ovConfirm").classList.add("show");
      setTimeout(()=>{ try{ $("pin").focus(); }catch(_){ } }, 0);
      return;
    }

    if(ok){
      $("doneIcon").textContent = "✅";
      $("doneTitle").textContent = "Đã gửi thành công";
      $("doneMsg").textContent = cfg.doneMsg(j || {});
      $("docLinkWrap").innerHTML = (j && j.docUrl)
        ? '<a href="'+j.docUrl+'" target="_blank" class="doc-link">🖨 Mở phiếu đề xuất để in</a>'
        : "";
      $("btnDoneOk").onclick = ()=>{
        clearPin();
        state.pending = null;
        $("ovDone").classList.remove("show");
        if(cfg.after) cfg.after();
      };
    }else{
      showFail(j);
    }

    $("ovDone").classList.add("show");
  }catch(err){
    $("ovSending").classList.remove("show");
    clearPin();
    showFail({message:"Không kết nối được hệ thống."});
    $("ovDone").classList.add("show");
  }
};

function showFail(j){
  clearPin();
  $("docLinkWrap").innerHTML = "";
  $("doneIcon").textContent = "⚠️";
  $("doneTitle").textContent = "Gửi chưa thành công";
  $("doneMsg").textContent =
    (j && j.message ? j.message + " — " : "")
    + "Kiểm tra dữ liệu/mạng rồi gửi lại. Nếu vẫn lỗi, ghi tạm sổ giấy và báo Leon.";
  $("btnDoneOk").onclick = ()=>{
    clearPin();
    $("ovDone").classList.remove("show");
  };
}
</script>
